name: Restore Pages custom domain

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/restore-pages-domain.yml

permissions:
  contents: read
  pages: write

jobs:
  restore-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Restore menwoman.ru
        uses: actions/github-script@v8
        with:
          script: |
            await github.request('PUT /repos/{owner}/{repo}/pages', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              cname: 'menwoman.ru',
              source: {
                branch: 'gh-pages',
                path: '/'
              },
              headers: {
                'X-GitHub-Api-Version': '2026-03-10'
              }
            })
